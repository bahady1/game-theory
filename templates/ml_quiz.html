<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Practice</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #f0f5fa;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }
    .quiz-container {
      max-width: 950px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,20,30,0.25);
      padding: 2rem 1.8rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #0b2b3c;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #1d4d6b;
      margin-bottom: 2rem;
      border-left: 4px solid #2b7a9e;
      padding-left: 1.2rem;
      font-weight: 400;
      font-size: 1rem;
      background: #eaf1f8;
      border-radius: 0 20px 20px 0;
      padding: 0.7rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .question-card {
      background: #ffffff;
      border: 1px solid #dce8f2;
      border-radius: 24px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.8rem;
      transition: 0.1s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }
    .question-card:hover {
      border-color: #b6d2e5;
    }
    .q-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .q-id {
      background: #1d4d6b;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }
    .q-topic {
      background: #dce8f2;
      color: #124061;
      font-weight: 500;
      font-size: 0.75rem;
      padding: 0.2rem 1rem;
      border-radius: 30px;
    }
    .q-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #0a283a;
      margin: 0.5rem 0 1.2rem 0;
      line-height: 1.5;
    }
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.5rem 0 0.8rem;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafd;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #e4edf5;
      cursor: pointer;
      transition: 0.08s ease;
    }
    .option-item:hover {
      background: #eef4fa;
      border-color: #aec8dd;
    }
    .option-item.selected {
      background: #d4e6f7;
      border-color: #2a7aa8;
      box-shadow: 0 0 0 2px #b0d0e8;
    }
    .option-item.correct-reveal {
      background: #c8e6d9;
      border-color: #1d7a5e;
    }
    .option-item.wrong-reveal {
      background: #f8dddd;
      border-color: #b34a4a;
    }
    .option-letter {
      font-weight: 700;
      color: #1e5a7a;
      background: #e1edf7;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .option-text {
      color: #1d3a4e;
      font-weight: 450;
      font-size: 1rem;
    }
    .feedback-area {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .feedback-badge {
      background: #ecf3fa;
      border-radius: 40px;
      padding: 0.3rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #005073;
      border: 1px solid #bed7ea;
    }
    .feedback-badge strong {
      background: #1c5b7a;
      color: white;
      padding: 0.1rem 0.9rem;
      border-radius: 30px;
      margin-left: 8px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .feedback-badge.correct {
      background: #d4eddd;
      border-color: #2f8f6b;
      color: #0b4a30;
    }
    .feedback-badge.wrong {
      background: #f7dbdb;
      border-color: #b75858;
      color: #752a2a;
    }
    .explanation-box {
      background: #f3f8fe;
      border-left: 4px solid #2b7a9e;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      color: #1a4055;
      margin-top: 4px;
      line-height: 1.5;
    }
    .explanation-box strong {
      color: #0b3f5a;
    }
    .btn-small {
      background: #e6eff6;
      border: 1px solid #b8cfdf;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      color: #1c5570;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.1s;
    }
    .btn-small:hover {
      background: #d2e2ef;
    }
    .btn-primary {
      background: #1d5b78;
      border: none;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.15s;
    }
    .btn-primary:hover {
      background: #134a63;
      transform: scale(1.02);
    }
    .footer-note {
      margin-top: 2.5rem;
      color: #2b5d7a;
      font-size: 0.95rem;
      text-align: center;
      border-top: 1px solid #dae6f0;
      padding-top: 1.8rem;
      background: #f4faff;
      border-radius: 60px;
      padding: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      align-items: center;
    }
    .progress-stats {
      font-weight: 500;
      color: #12445f;
    }
    .batch-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1rem 0 0.5rem;
    }
    @media (max-width: 600px) {
      .quiz-container { padding: 1.2rem; }
      .q-text { font-size: 1rem; }
      .option-item { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="app">
  <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
    <h1>🧠 NN1 · practice (10 at a time)</h1>
    <span style="background: #e1edf6; border-radius: 60px; padding: 0.2rem 1.4rem; font-size: 0.8rem; color:#1c4b63;">random batch</span>
  </header>
  <div class="subhead">
    <span>⚡ 10 random questions · select an option to see explanation</span>
    <span style="margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="btn-small" id="resetAllBtn">↺ reset all</button>
      <button class="btn-small" id="reshuffleBtn">🔀 new batch</button>
    </span>
  </div>

  <div id="quizRoot"></div>

  <div class="batch-controls">
    <button class="btn-primary" id="nextBatchBtn">📚 Next 10 random questions</button>
  </div>

  <div class="footer-note">
    <span class="progress-stats" id="statsDisplay">✅ 0 / 10 answered</span>
    <span style="color:#1b5470;">• explanations shown after each answer</span>
  </div>
</div>

<script src="/static/questions.js"></script>
<script>
  (function() {
    // ---------- helpers ----------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // shuffle options inside a question, return new object
    function shuffleOptions(q) {
      const entries = Object.entries(q.options);
      const shuffled = shuffleArray([...entries]);
      const newOpts = {};
      const letterMap = ['A', 'B', 'C', 'D'];
      let correctLetter = null;
      shuffled.forEach(([key, text], idx) => {
        const newKey = letterMap[idx];
        newOpts[newKey] = text;
        if (key === q.correct) correctLetter = newKey;
      });
      return { ...q, options: newOpts, correct: correctLetter };
    }

    // pick 10 random questions from the full deck, shuffle options inside
    function pickRandomBatch(size = 10) {
      const shuffled = shuffleArray([...QUESTION_BANK]);
      const selected = shuffled.slice(0, size);
      return selected.map(q => shuffleOptions({ ...q, options: { ...q.options } }));
    }

    // ----- state -----
    let currentBatch = pickRandomBatch(10);
    let answerState = currentBatch.map(() => ({ selected: null, revealed: false }));

    // DOM refs
    const root = document.getElementById('quizRoot');
    const statsDisplay = document.getElementById('statsDisplay');

    function updateStats() {
      const answered = answerState.filter(s => s.selected !== null).length;
      const total = answerState.length;
      statsDisplay.textContent = `✅ ${answered} / ${total} answered`;
    }

    function render() {
      root.innerHTML = '';
      currentBatch.forEach((q, idx) => {
        const state = answerState[idx];
        const card = document.createElement('div');
        card.className = 'question-card';

        const header = document.createElement('div');
        header.className = 'q-header';
        header.innerHTML = `
          <span class="q-id">${q.id}</span>
          <span class="q-topic">${q.topic}</span>
          <span style="margin-left: auto; color: #2d657d; font-size:0.8rem; background:#e7f0f7; padding:0.1rem 1rem; border-radius:30px;">#${idx+1}</span>
        `;

        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.textContent = q.question;

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options-grid';
        const letters = ['A', 'B', 'C', 'D'];

        letters.forEach(letter => {
          const optText = q.options[letter];
          if (optText === undefined) return;
          const item = document.createElement('div');
          item.className = 'option-item';
          if (state.selected === letter) {
            item.classList.add('selected');
          }
          if (state.revealed) {
            if (letter === q.correct) {
              item.classList.add('correct-reveal');
            } else if (state.selected === letter && letter !== q.correct) {
              item.classList.add('wrong-reveal');
            }
          }

          item.innerHTML = `
            <span class="option-letter">${letter}</span>
            <span class="option-text">${optText}</span>
          `;

          item.addEventListener('click', (e) => {
            e.stopPropagation();
            if (state.revealed) return;
            state.selected = letter;
            state.revealed = true;
            render();
            updateStats();
          });

          optionsDiv.appendChild(item);
        });

        const feedback = document.createElement('div');
        feedback.className = 'feedback-area';

        if (state.revealed) {
          const isCorrect = state.selected === q.correct;
          const badge = document.createElement('span');
          badge.className = `feedback-badge ${isCorrect ? 'correct' : 'wrong'}`;
          if (isCorrect) {
            badge.innerHTML = `✅ correct! <strong>${q.correct}</strong>`;
          } else {
            badge.innerHTML = `❌ you chose ${state.selected} · correct: <strong>${q.correct}</strong>`;
          }
          feedback.appendChild(badge);

          // explanation
          const expBox = document.createElement('div');
          expBox.className = 'explanation-box';
          expBox.innerHTML = `<strong>💡 Explanation:</strong> ${q.explanation}`;
          feedback.appendChild(expBox);

          const resetBtn = document.createElement('button');
          resetBtn.className = 'btn-small';
          resetBtn.textContent = '↺ reset this';
          resetBtn.style.marginLeft = 'auto';
          resetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            state.selected = null;
            state.revealed = false;
            render();
            updateStats();
          });
          feedback.appendChild(resetBtn);
        } else {
          const hint = document.createElement('span');
          hint.className = 'feedback-badge';
          hint.textContent = '💡 click an option to answer';
          feedback.appendChild(hint);
        }

        card.appendChild(header);
        card.appendChild(qText);
        card.appendChild(optionsDiv);
        card.appendChild(feedback);
        root.appendChild(card);
      });
      updateStats();
    }

    function resetAll() {
      answerState = currentBatch.map(() => ({ selected: null, revealed: false }));
      render();
    }

    function loadNewBatch() {
      currentBatch = pickRandomBatch(10);
      answerState = currentBatch.map(() => ({ selected: null, revealed: false }));
      render();
    }

    // event listeners
    document.getElementById('resetAllBtn').addEventListener('click', resetAll);
    document.getElementById('reshuffleBtn').addEventListener('click', loadNewBatch);
    document.getElementById('nextBatchBtn').addEventListener('click', loadNewBatch);

    // initial render
    render();
  })();
</script>
</body>
</html>
