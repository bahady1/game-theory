<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Neural Networks Quiz – 50 mixed questions</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }
    .quiz-container {
      max-width: 950px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,20,30,0.25);
      padding: 2rem 1.8rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #0b2b3c;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 0.25rem;
    }
    .subhead {
      color: #3a5a6e;
      margin-bottom: 2rem;
      border-left: 4px solid #2b7a9e;
      padding-left: 1.2rem;
      font-weight: 400;
      font-size: 1.05rem;
      background: #eaf1f8;
      border-radius: 0 20px 20px 0;
      padding: 0.7rem 1.5rem;
    }
    .question-card {
      background: #ffffff;
      border: 1px solid #e2ebf3;
      border-radius: 24px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.8rem;
      transition: 0.1s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    }
    .question-card:hover {
      border-color: #b6d2e5;
      box-shadow: 0 8px 16px -8px rgba(0, 60, 90, 0.08);
    }
    .q-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .q-id {
      background: #1d4d6b;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }
    .q-topic {
      background: #dce8f2;
      color: #124061;
      font-weight: 500;
      font-size: 0.75rem;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      letter-spacing: 0.2px;
    }
    .q-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #0a283a;
      margin: 0.5rem 0 1.2rem 0;
      line-height: 1.5;
    }
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.5rem 0 0.2rem;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafd;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #e4edf5;
      transition: 0.08s linear;
      cursor: default;
    }
    .option-item:hover {
      background: #eef4fa;
      border-color: #bed7ea;
    }
    .option-letter {
      font-weight: 700;
      color: #1e5a7a;
      background: #e1edf7;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      font-size: 0.9rem;
    }
    .option-text {
      color: #1d3a4e;
      font-weight: 450;
      font-size: 1rem;
    }
    .answer-badge {
      margin-top: 1rem;
      background: #dff0fa;
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #005073;
      border: 1px solid #bcd6e9;
    }
    .answer-badge strong {
      background: #1c5b7a;
      color: white;
      padding: 0.1rem 0.9rem;
      border-radius: 30px;
      margin-left: 8px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .footer-note {
      margin-top: 2.5rem;
      color: #2b5d7a;
      font-size: 0.95rem;
      text-align: center;
      border-top: 1px solid #dae6f0;
      padding-top: 1.8rem;
      background: #f4faff;
      border-radius: 60px;
      padding: 1.2rem;
    }
    .btn-reset {
      background: none;
      border: 1px solid #b5cfdf;
      padding: 0.4rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      color: #1d5b78;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }
    .btn-reset:hover {
      background: #d3e4f0;
      border-color: #7fa6c0;
    }
    .shuffle-badge {
      background: #e1edf6;
      border-radius: 60px;
      padding: 0.2rem 1.2rem;
      font-size: 0.8rem;
      color: #1c4b63;
    }
    @media (max-width: 600px) {
      .quiz-container { padding: 1.2rem; }
      .q-text { font-size: 1rem; }
      .option-item { padding: 0.5rem 1rem; }
      .q-header { gap: 8px; }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="app">
  <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
    <h1>🧠 NN1 · 50</h1>
    <span class="shuffle-badge">⚡ shuffled questions & options</span>
  </header>
  <div class="subhead">
    ⚡ each question displays the correct answer · order randomized
  </div>

  <div id="quizRoot"></div>

  <div class="footer-note">
    <span>✅ all 50 questions from the catalog · options and question order mixed</span>
    <div style="margin-top: 10px;">
      <button class="btn-reset" id="reshuffleBtn">🔀 reshuffle quiz</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- raw question data (copied from catalog, 50 items) -----
    const RAW_QUESTIONS = [
      { id: "NN1-001", topic: "Machine learning definition", question: "Which statement best captures the standard experience-task-performance definition of machine learning?", options: { A: "A program learns if it stores more data than before.", B: "A program learns from experience E with respect to a task T and performance measure P if performance on T, measured by P, improves with E.", C: "A program learns if it can execute hand-written rules more quickly over time.", D: "A program learns if it can solve any task without examples or feedback." }, correct: "B" },
      { id: "NN1-002", topic: "Machine learning paradigm", question: "In the usual paradigm-shift description of machine learning, what replaces writing all rules by hand?", options: { A: "The system infers rules or model parameters from data and desired outputs.", B: "The system ignores the data and searches directly for labels.", C: "The programmer writes a larger rule base before training.", D: "The system chooses random rules and keeps them fixed." }, correct: "A" },
      { id: "NN1-003", topic: "Supervised learning", question: "A model is trained on images together with their class labels. Which learning setting is this?", options: { A: "Unsupervised learning", B: "Supervised learning", C: "Reinforcement learning", D: "Out-of-core learning" }, correct: "B" },
      { id: "NN1-004", topic: "Unsupervised learning", question: "Which task is most naturally treated as an unsupervised learning problem?", options: { A: "Predicting house prices from labeled examples", B: "Grouping customers into similar clusters without preassigned group labels", C: "Training an agent to maximize reward in a game", D: "Computing the exact derivative of a known polynomial" }, correct: "B" },
      { id: "NN1-005", topic: "Reinforcement learning", question: "What is the main objective of an agent in reinforcement learning?", options: { A: "To memorize all previously observed states", B: "To minimize the number of actions it can choose from", C: "To maximize expected cumulative reward through interaction with an environment", D: "To reproduce labels supplied for every state-action pair" }, correct: "C" },
      { id: "NN1-006", topic: "Policy in reinforcement learning", question: "After successful reinforcement learning, what does the learned policy do?", options: { A: "It maps states to actions that are expected to be good for the task.", B: "It maps actions to random states for exploration only.", C: "It replaces the reward function with a classification loss.", D: "It stores the raw training images used by the agent." }, correct: "A" },
      { id: "NN1-007", topic: "Batch vs online learning", question: "Which description best characterizes online learning?", options: { A: "The model is trained once on the complete data set and then never updated.", B: "The model is updated incrementally as individual examples or mini-batches arrive.", C: "The model can only be trained when no internet connection is available.", D: "The model uses only unlabeled data and never uses targets." }, correct: "B" },
      { id: "NN1-008", topic: "Instance-based learning", question: "What is central to instance-based learning?", options: { A: "A similarity measure between new samples and stored examples", B: "A convolution kernel applied to every image", C: "A reward signal from an environment", D: "A validation set that is larger than the training set" }, correct: "A" },
      { id: "NN1-009", topic: "Model-based learning", question: "In model-based learning, what is used for generalization to new data?", options: { A: "Only the closest stored training example", B: "A trained model with learned parameters", C: "A manually written list of all possible outputs", D: "The order in which the data was collected" }, correct: "B" },
      { id: "NN1-010", topic: "Data challenges", question: "Which of the following is a typical data-related challenge in machine learning?", options: { A: "The activation function is non-linear", B: "The data is not representative of the real problem distribution", C: "The gradient is computed by the chain rule", D: "The model has a bias parameter" }, correct: "B" },
      { id: "NN1-011", topic: "Overfitting", question: "A neural network performs very well on the training set but poorly on unseen data. What is the most likely problem?", options: { A: "Overfitting / high variance", B: "Underfitting / high bias", C: "The model has no parameters", D: "The problem must be unsupervised" }, correct: "A" },
      { id: "NN1-012", topic: "Underfitting", question: "A model performs poorly both on the training set and on the validation set. Which diagnosis is most plausible?", options: { A: "The model is probably too simple or lacks useful features.", B: "The model has memorized the training data perfectly.", C: "The test set has been used too late.", D: "The labels are unnecessary for supervised learning." }, correct: "A" },
      { id: "NN1-013", topic: "Accuracy on imbalanced data", question: "Why can accuracy be misleading for a highly imbalanced binary classification problem?", options: { A: "Accuracy cannot be computed for binary classification.", B: "A classifier that always predicts the majority class may achieve high accuracy while being useless for the minority class.", C: "Accuracy is always identical to recall.", D: "Accuracy requires a convolutional neural network." }, correct: "B" },
      { id: "NN1-014", topic: "Test set", question: "What is the main purpose of a separate test set?", options: { A: "To update the model weights after every epoch", B: "To tune hyperparameters until the best configuration is found", C: "To estimate final performance on data not used for training or model selection", D: "To replace the training set when there is little data" }, correct: "C" },
      { id: "NN1-015", topic: "Validation set", question: "During model development, what is a validation set commonly used for?", options: { A: "Choosing hyperparameters or comparing model variants", B: "Defining the labels for the entire data set", C: "Replacing the loss function during backpropagation", D: "Guaranteeing that the model has no bias" }, correct: "A" },
      { id: "NN1-016", topic: "Categorical variables", question: "Why is one-hot encoding often preferred over integer encoding for nominal categories?", options: { A: "It forces an artificial order relation between categories.", B: "It avoids implying an ordinal relationship between unrelated categories.", C: "It removes the need for a training set.", D: "It makes every category numerically identical." }, correct: "B" },
      { id: "NN1-017", topic: "Missing values", question: "Which strategy is a common way to handle missing numerical values?", options: { A: "Replace missing entries with a suitable statistic such as the median, when appropriate.", B: "Always replace missing entries with the class label.", C: "Set the learning rate to zero.", D: "Convert all numerical features into image pixels." }, correct: "A" },
      { id: "NN1-018", topic: "Confusion matrix", question: "In a binary classifier, what is a false positive?", options: { A: "The model predicts positive, and the true class is negative.", B: "The model predicts negative, and the true class is positive.", C: "The model predicts positive, and the true class is positive.", D: "The model predicts negative, and the true class is negative." }, correct: "A" },
      { id: "NN1-019", topic: "Precision", question: "Which formula defines precision in binary classification?", options: { A: "TP / (TP + FN)", B: "TN / (TN + FP)", C: "TP / (TP + FP)", D: "(TP + TN) / (TP + TN + FP + FN)" }, correct: "C" },
      { id: "NN1-020", topic: "Recall", question: "Which formula defines recall in binary classification?", options: { A: "TP / (TP + FN)", B: "TP / (TP + FP)", C: "FP / (FP + TN)", D: "TN / (TN + FN)" }, correct: "A" },
      { id: "NN1-021", topic: "F1 score", question: "What does the F1 score combine?", options: { A: "Learning rate and batch size", B: "Precision and recall", C: "Training loss and number of layers", D: "True negatives and validation loss only" }, correct: "B" },
      { id: "NN1-022", topic: "Precision-recall tradeoff", question: "What usually happens when the decision threshold of a binary classifier is changed?", options: { A: "Precision and recall can change, often in opposite directions.", B: "The number of model parameters becomes zero.", C: "The training set is automatically enlarged.", D: "The classifier stops producing scores." }, correct: "A" },
      { id: "NN1-023", topic: "ROC and AUC", question: "What is plotted on a standard ROC curve?", options: { A: "Training loss versus number of hidden layers", B: "True positive rate versus false positive rate", C: "Precision versus number of epochs", D: "Learning rate versus batch size" }, correct: "B" },
      { id: "NN1-024", topic: "Linear regression", question: "In simple linear regression with model \\(y_{\\mathrm{pred}} = \\alpha + \\beta x\\), what is learned from the data?", options: { A: "The input values \\(x\\) themselves", B: "The parameters alpha and beta", C: "The number of classes in a CNN", D: "The one-hot encoding of the labels" }, correct: "B" },
      { id: "NN1-025", topic: "Cost functions", question: "Why does minimizing mean squared error help fit a regression model?", options: { A: "It makes predictions close to target values according to a chosen error measure.", B: "It guarantees that every prediction is an integer class label.", C: "It removes all input features from the model.", D: "It prevents gradients from being computed." }, correct: "A" },
      { id: "NN1-026", topic: "Sigmoid activation", question: "Which expression is the sigmoid activation function?", options: { A: "\\(g(z) = \\max(0, z)\\)", B: "\\(g(z) = 1 / (1 + \\exp(-z))\\)", C: "\\(g(z) = z^{-2}\\)", D: "\\(g(z) = \\exp(z) / z\\)" }, correct: "B" },
      { id: "NN1-027", topic: "XOR and nonlinearity", question: "Why can a single linear decision boundary not solve the XOR classification problem?", options: { A: "The XOR labels are not linearly separable in the original two-dimensional input space.", B: "XOR has only one input variable.", C: "XOR has no labels.", D: "Linear models cannot have bias terms." }, correct: "A" },
      { id: "NN1-028", topic: "Activation functions", question: "Why are non-linear activation functions essential in multilayer neural networks?", options: { A: "Without non-linearities, a stack of linear layers is still only a linear function.", B: "They remove the need for a loss function.", C: "They make all gradients exactly zero.", D: "They guarantee perfect performance on all data sets." }, correct: "A" },
      { id: "NN1-029", topic: "Common activations", question: "Which list contains only common neural-network activation functions?", options: { A: "Sigmoid, tanh, ReLU, leaky ReLU", B: "Mean, median, variance, standard deviation", C: "Precision, recall, F1, AUC", D: "Train, validation, test, batch" }, correct: "A" },
      { id: "NN1-030", topic: "Neural network training", question: "Which sequence best describes one standard training iteration for a neural network?", options: { A: "Forward pass, compute loss, backpropagate gradients, update weights", B: "Update weights, erase labels, compute ROC, remove the loss", C: "Cluster data, one-hot encode the optimizer, freeze all parameters, stop", D: "Compute test accuracy, choose a new data set, delete gradients, increase bias manually" }, correct: "A" },
      { id: "NN1-031", topic: "Backpropagation", question: "Which mathematical rule is implemented by backpropagation?", options: { A: "The chain rule for derivatives", B: "Bayes rule only", C: "The triangle inequality", D: "The rule of three" }, correct: "A" },
      { id: "NN1-032", topic: "Computational graphs", question: "Why do deep learning frameworks use computational graphs?", options: { A: "To represent operations and dependencies so that gradients can be computed automatically", B: "To remove all non-linear functions from the model", C: "To replace training data with diagrams", D: "To make all models unsupervised" }, correct: "A" },
      { id: "NN1-033", topic: "Learning rate", question: "What is the role of the learning rate in gradient descent?", options: { A: "It determines the step size of parameter updates.", B: "It determines the number of classes in the data.", C: "It is the same as the validation accuracy.", D: "It specifies the image width after convolution." }, correct: "A" },
      { id: "NN1-034", topic: "Learning rate problems", question: "What can happen if the learning rate is chosen much too large?", options: { A: "Training may overshoot minima and become unstable.", B: "The model must become linear.", C: "The data automatically becomes balanced.", D: "All missing values are imputed." }, correct: "A" },
      { id: "NN1-035", topic: "Regularization", question: "What is the purpose of regularization in neural-network training?", options: { A: "To reduce overfitting by constraining the model, for example by penalizing large weights or using dropout", B: "To force the model to achieve zero training loss at all costs", C: "To convert every problem into reinforcement learning", D: "To make the validation set identical to the training set" }, correct: "A" },
      { id: "NN1-036", topic: "Dropout", question: "What is the basic idea of dropout regularization during training?", options: { A: "Randomly deactivate some units so the network cannot rely too strongly on specific activations.", B: "Remove all training examples with missing values.", C: "Set the learning rate permanently to zero.", D: "Replace every convolution with average pooling." }, correct: "A" },
      { id: "NN1-037", topic: "Convolution output size", question: "For a square input of size n x n, filter size f x f, padding p, and stride 1, what is the spatial output size of a convolution?", options: { A: "\\((n + 2p - f + 1) \\times (n + 2p - f + 1)\\)", B: "\\((n - 2p + f) \\times (n - 2p + f)\\)", C: "\\((n f p) \\times (n f p)\\)", D: "\\((p + f - 1) \\times (p + f - 1)\\)" }, correct: "A" },
      { id: "NN1-038", topic: "Edge-detection kernels", question: "Which 3x3 kernel is a typical vertical edge detector of the kind discussed in class?", options: { A: "[[1, 0, -1], [1, 0, -1], [1, 0, -1]]", B: "[[1, 1, 1], [0, 0, 0], [-1, -1, -1]]", C: "[[0, 0, 0], [0, 1, 0], [0, 0, 0]]", D: "[[1, 1, 1], [1, 1, 1], [1, 1, 1]]" }, correct: "A" },
      { id: "NN1-039", topic: "Padding", question: "Why is padding commonly used in convolutional networks?", options: { A: "To control spatial shrinking and allow edge pixels to contribute more fully to convolutions", B: "To remove all bias terms from the network", C: "To make the image labels continuous", D: "To turn a recurrent network into a dense network" }, correct: "A" },
      { id: "NN1-040", topic: "Valid and same convolution", question: "For stride 1 and odd filter size f, what padding p gives same convolution for an n x n input?", options: { A: "\\(p = 0\\)", B: "\\(p = (f - 1) / 2\\)", C: "\\(p = n + f\\)", D: "\\(p = f^{-2}\\)" }, correct: "B" },
      { id: "NN1-041", topic: "Pooling layers", question: "Which statement about pooling layers is correct?", options: { A: "Max pooling selects the largest value in each pooling window.", B: "Pooling layers usually learn one weight for every pixel in the input image.", C: "Average pooling always increases the spatial resolution.", D: "Pooling is identical to one-hot encoding." }, correct: "A" },
      { id: "NN1-042", topic: "CNN motivation", question: "Why are CNNs usually better suited than fully connected networks for image tasks?", options: { A: "They learn local filters that reuse weights across spatial positions, reducing parameters and exploiting image structure.", B: "They require no training data.", C: "They can only process one-dimensional sequences.", D: "They avoid all non-linear activations." }, correct: "A" },
      { id: "NN1-043", topic: "Dense network parameter count", question: "A dense network has 3 inputs, one hidden layer with 2 neurons, and one output neuron. Including biases, how many trainable parameters does it have?", options: { A: "6", B: "8", C: "11", D: "12" }, correct: "C" },
      { id: "NN1-044", topic: "RNN neuron", question: "How does a recurrent neuron differ from a neuron in a standard multilayer perceptron?", options: { A: "It also receives information from the previous time step.", B: "It has no weights.", C: "It can only be used for images.", D: "It does not use activation functions." }, correct: "A" },
      { id: "NN1-045", topic: "Unrolling RNNs", question: "What does it mean to unroll a recurrent network in time?", options: { A: "Represent the repeated recurrent computation as a sequence of linked copies across time steps.", B: "Remove all time steps from the data.", C: "Replace recurrence with one-hot encoding.", D: "Train a CNN with larger filters." }, correct: "A" },
      { id: "NN1-046", topic: "RNN training", question: "Which method is used to train recurrent neural networks through time?", options: { A: "Backpropagation through time", B: "K-means through time", C: "Padding through time", D: "ROC through time" }, correct: "A" },
      { id: "NN1-047", topic: "LSTM inputs and state", question: "Compared with a simple recurrent neuron, what additional state is central to an LSTM?", options: { A: "A long-term cell state in addition to the hidden state", B: "A convolution filter with fixed values", C: "A confusion matrix stored at each time step", D: "A one-hot encoded class label used as a weight matrix" }, correct: "A" },
      { id: "NN1-048", topic: "LSTM gates", question: "Which set lists the standard gates of an LSTM cell?", options: { A: "Forget gate, update/input gate, output gate", B: "Pooling gate, padding gate, stride gate", C: "Precision gate, recall gate, F1 gate", D: "Train gate, validation gate, test gate" }, correct: "A" },
      { id: "NN1-049", topic: "Vanishing gradients", question: "Which problem motivated the development and use of LSTMs for sequence modeling?", options: { A: "Vanishing gradients in long unrolled recurrent networks", B: "The impossibility of using labels in supervised learning", C: "The lack of any activation function in CNNs", D: "The fact that precision and recall are always equal" }, correct: "A" },
      { id: "NN1-050", topic: "RNN sequence tasks", question: "For named entity recognition with an RNN, which architecture is most appropriate?", options: { A: "Sequence-to-sequence with one output decision per input token", B: "Sequence-to-vector with only one output for the whole sentence", C: "Image-to-image convolution without time steps", D: "Reinforcement learning with no input tokens" }, correct: "A" }
    ];

    // ---------- helpers ----------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // shuffle options inside a question (returns new object)
    function shuffleOptions(q) {
      const entries = Object.entries(q.options);
      const shuffled = shuffleArray([...entries]);
      const newOpts = {};
      const letterMap = ['A', 'B', 'C', 'D'];
      let correctLetter = null;
      shuffled.forEach(([key, text], idx) => {
        const newKey = letterMap[idx];
        newOpts[newKey] = text;
        if (key === q.correct) correctLetter = newKey;
      });
      // ensure correct answer maps to new letter
      return { ...q, options: newOpts, correct: correctLetter };
    }

    // prepare full shuffled deck: shuffle order of questions, and inside each shuffle options
    function buildShuffledDeck() {
      // deep copy
      const deck = RAW_QUESTIONS.map(q => ({ ...q, options: { ...q.options } }));
      // shuffle question order
      shuffleArray(deck);
      // shuffle options inside each question
      return deck.map(q => shuffleOptions(q));
    }

    // render
    function render(deck) {
      const root = document.getElementById('quizRoot');
      root.innerHTML = '';
      deck.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const header = document.createElement('div');
        header.className = 'q-header';
        header.innerHTML = `
          <span class="q-id">${q.id}</span>
          <span class="q-topic">${q.topic}</span>
          <span style="margin-left: auto; color: #2d657d; font-size:0.8rem; background:#e7f0f7; padding:0.1rem 1rem; border-radius:30px;">#${idx+1}</span>
        `;

        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.textContent = q.question;

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options-grid';

        const letters = ['A', 'B', 'C', 'D'];
        letters.forEach(letter => {
          const optText = q.options[letter];
          if (optText === undefined) return;
          const item = document.createElement('div');
          item.className = 'option-item';
          item.innerHTML = `
            <span class="option-letter">${letter}</span>
            <span class="option-text">${optText}</span>
          `;
          optionsDiv.appendChild(item);
        });

        const badge = document.createElement('div');
        badge.className = 'answer-badge';
        badge.innerHTML = `✅ correct answer: <strong>${q.correct}</strong>`;

        card.appendChild(header);
        card.appendChild(qText);
        card.appendChild(optionsDiv);
        card.appendChild(badge);
        root.appendChild(card);
      });
    }

    // state
    let currentDeck = buildShuffledDeck();

    function refreshQuiz() {
      currentDeck = buildShuffledDeck();
      render(currentDeck);
    }

    // initial render
    render(currentDeck);

    // reshuffle button
    document.getElementById('reshuffleBtn').addEventListener('click', refreshQuiz);
  })();
</script>
